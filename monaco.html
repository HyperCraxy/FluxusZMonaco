<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FluxusZ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg-color: #060D14;
            --primary-accent: #4facfe;
            --text-main: #ffffff;
            --font-main: 'Outfit', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main), 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor-shell {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
        }

        .tabs-bar {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(6, 13, 20, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 8px 0 8px;
            height: 36px;
            flex-shrink: 0;
        }

        .tabs-container {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            height: 100%;
            align-items: center;
        }

        .tabs-container::-webkit-scrollbar { height: 0px; }
        .tabs-container { scroll-behavior: smooth; }

        .tab-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 8px;
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 11.5px;
            letter-spacing: 0.01em;
            color: rgba(255,255,255,0.38);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            min-width: 0;
            max-width: 180px;
            user-select: none;
            position: relative;
        }

        .tab-item:hover {
            background: rgba(79, 172, 254, 0.07);
            color: rgba(255,255,255,0.7);
            border-color: rgba(79, 172, 254, 0.12);
        }

        .tab-item.active {
            background: rgba(79, 172, 254, 0.11);
            border-color: rgba(79, 172, 254, 0.28);
            color: #e8f4ff;
            font-weight: 500;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.08);
        }

        .tab-item.active .tab-file-icon {
            color: #4facfe;
            opacity: 1;
        }

        .tab-file-icon {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            opacity: 0.4;
            transition: opacity 0.15s, color 0.15s;
        }

        .tab-item:hover .tab-file-icon {
            opacity: 0.7;
        }

        .tab-name {
            outline: none;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: inherit;
            font: inherit;
            padding: 0;
            min-width: 20px;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-name.editing {
            border-bottom-color: #4facfe;
            cursor: text;
            color: #fff;
            text-overflow: clip;
        }

        .tab-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            opacity: 0;
            flex-shrink: 0;
            transition: opacity 0.15s, background 0.15s, color 0.15s;
            margin-left: 1px;
            color: rgba(255,255,255,0.5);
        }

        .tab-item:hover .tab-close,
        .tab-item.active .tab-close {
            opacity: 0.5;
        }

        .tab-close:hover {
            opacity: 1 !important;
            background: rgba(79, 172, 254, 0.18);
            color: #4facfe;
        }

        .add-tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .add-tab-btn:hover {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
        }

        #monaco-editor { flex: 1; width: 100%; }

        .monaco-editor,
        .monaco-editor .margin,
        .monaco-editor-background,
        .monaco-editor .inputarea.ime-input {
            background-color: transparent !important;
        }
    </style>
</head>

<body>
    <div class="editor-shell">
        <div class="tabs-bar" id="tabs-bar">
            <div class="tabs-container" id="tabs-container"></div>
            <button class="add-tab-btn" id="add-tab-btn" title="New Tab">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        <div id="monaco-editor"></div>
    </div>

    <script>
        const STORAGE_KEY = 'FluxusZ_tabs';

        const persist = () => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ tabs, activeTabId }));
            } catch (e) {}
        };

        const loadFromStorage = () => {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    if (parsed.tabs && parsed.tabs.length > 0) return parsed;
                }
            } catch (e) {}
            return null;
        };

        const stored = loadFromStorage();
        let tabs = stored ? stored.tabs : [{ id: 'tab-1', name: 'Tab', content: '--FluxusZ' }];
        let activeTabId = stored ? stored.activeTabId : 'tab-1';

        if (!tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;

        const renameTab = (id, inputEl) => {
            inputEl.classList.add('editing');
            inputEl.contentEditable = 'true';
            inputEl.focus();

            const range = document.createRange();
            range.selectNodeContents(inputEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            const finish = () => {
                inputEl.contentEditable = 'false';
                inputEl.classList.remove('editing');
                const newName = inputEl.textContent.trim();
                const tab = tabs.find(t => t.id === id);
                if (tab) {
                    tab.name = newName || tab.name;
                    inputEl.textContent = tab.name;
                    persist();
                }
            };

            inputEl.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); inputEl.blur(); }
                if (e.key === 'Escape') { inputEl.textContent = tabs.find(t => t.id === id)?.name || ''; inputEl.blur(); }
                e.stopPropagation();
            }, { once: false });

            inputEl.addEventListener('blur', finish, { once: true });
        };

        const updateTabsUI = () => {
            const container = document.getElementById('tabs-container');
            if (!container) return;
            container.innerHTML = '';

            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab-item ${tab.id === activeTabId ? 'active' : ''}`;

                const iconEl = document.createElement('span');
                iconEl.className = 'tab-file-icon';
                iconEl.innerHTML = `<svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M7.375 0C7.80598 0 8.2193 0.171205 8.52405 0.475951C8.8288 0.780698 9 1.19402 9 1.625V5H6.625C6.19402 5 5.7807 5.17121 5.47595 5.47595C5.17121 5.7807 5 6.19402 5 6.625V9H1.625C1.19402 9 0.780698 8.8288 0.475951 8.52405C0.171205 8.2193 0 7.80598 0 7.375V1.625C0 1.19402 0.171205 0.780698 0.475951 0.475951C0.780698 0.171205 1.19402 0 1.625 0H7.375ZM8.78 5.75L5.75 8.78V6.625C5.75 6.142 6.142 5.75 6.625 5.75H8.78Z"/></svg>`;

                const nameEl = document.createElement('span');
                nameEl.className = 'tab-name';
                nameEl.contentEditable = 'false';
                nameEl.textContent = tab.name;
                nameEl.title = 'Double-click to rename';

                nameEl.addEventListener('dblclick', (e) => {
                    e.stopPropagation();
                    switchTab(tab.id);
                    renameTab(tab.id, nameEl);
                });

                const closeEl = document.createElement('div');
                closeEl.className = 'tab-close';
                closeEl.title = 'Close tab';
                closeEl.innerHTML = `
                    <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="4">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                `;

                tabEl.appendChild(iconEl);
                tabEl.appendChild(nameEl);
                tabEl.appendChild(closeEl);

                tabEl.addEventListener('click', () => switchTab(tab.id));
                closeEl.addEventListener('click', (e) => {
                    e.stopPropagation();
                    closeTab(tab.id);
                });

                container.appendChild(tabEl);
            });
        };

        const switchTab = (id) => {
            if (activeTabId === id) return;

            const currentTab = tabs.find(t => t.id === activeTabId);
            if (currentTab && window.editor) currentTab.content = window.editor.getValue();

            activeTabId = id;
            const newTab = tabs.find(t => t.id === id);
            if (newTab && window.editor) window.editor.setValue(newTab.content);

            persist();
            updateTabsUI();
        };

        const closeTab = (id) => {
            if (tabs.length === 1) return;

            const index = tabs.findIndex(t => t.id === id);
            tabs = tabs.filter(t => t.id !== id);

            if (activeTabId === id) {
                const nextTab = tabs[index] || tabs[index - 1];
                activeTabId = nextTab.id;
                if (window.editor) window.editor.setValue(nextTab.content);
            }

            persist();
            updateTabsUI();
        };

        const addTab = () => {
            const id = `tab-${Date.now()}`;
            tabs.push({ id, name: `Tab ${tabs.length + 1}`, content: '' });
            switchTab(id);
        };

        document.getElementById('add-tab-btn')?.addEventListener('click', addTab);

        document.getElementById('tabs-container')?.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                e.preventDefault();
                document.getElementById('tabs-container').scrollLeft += e.deltaY;
            }
        }, { passive: false });

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

        require(['vs/editor/editor.main'], function () {
            monaco.languages.registerCompletionItemProvider('lua', {
                triggerCharacters: ['.', ':', ' '],
                provideCompletionItems: (model, position) => {
                    const suggestions = [
                        ...['and', 'break', 'do', 'else', 'elseif', 'end', 'false', 'for', 'function', 'if', 'in', 'local', 'nil', 'not', 'or', 'repeat', 'return', 'then', 'true', 'until', 'while'].map(k => ({
                            label: k, kind: monaco.languages.CompletionItemKind.Keyword, insertText: k
                        })),
                        ...['game', 'workspace', 'script', 'shared', '_G', 'Enum', 'Instance', 'Vector3', 'CFrame', 'Color3', 'Rect', 'UDim', 'UDim2', 'Ray', 'Region3', 'TweenInfo'].map(g => ({
                            label: g, kind: monaco.languages.CompletionItemKind.Class, insertText: g
                        })),
                        ...[
                            // Identity / executor info
                            { label: 'identifyexecutor',    sig: 'identifyexecutor()',              doc: 'Returns the executor name and version string.' },
                            { label: 'getexecutorname',     sig: 'getexecutorname()',               doc: 'Alias for identifyexecutor().' },
                            { label: 'checkcaller',         sig: 'checkcaller()',                   doc: 'Returns true if the calling function is from executor context.' },
                            { label: 'checkclosure',        sig: 'checkclosure(func)',              doc: 'Alias for isourclosure(func).' },
                            { label: 'isourclosure',        sig: 'isourclosure(func)',              doc: 'Returns true if func was defined in the executor environment.' },
                            { label: 'isexecutorclosure',   sig: 'isexecutorclosure(func)',         doc: 'Alias for isourclosure(func).' },
                            { label: 'getgenv',             sig: 'getgenv()',                       doc: 'Returns the global executor environment table.' },
                            { label: 'getrenv',             sig: 'getrenv()',                       doc: 'Returns a readonly copy of the Roblox environment.' },
                            { label: 'getmenv',             sig: 'getmenv()',                       doc: 'Returns the Roblox native environment (alias for getrenv()).' },
                            { label: 'getsenv',             sig: 'getsenv(script)',                 doc: 'Returns a sandboxed environment scoped to the given script instance.' },
                            { label: 'getfpscap',           sig: 'getfpscap()',                     doc: 'Returns the current FPS cap as a number.' },
                            { label: 'setfpscap',           sig: 'setfpscap(cap)',                  doc: 'Sets the FPS cap. Pass 0 for unlimited.' },
                            { label: 'getthreadidentity',   sig: 'getthreadidentity()',             doc: 'Returns the current thread identity level (0–8).' },
                            { label: 'getidentity',         sig: 'getidentity()',                   doc: 'Alias for getthreadidentity().' },
                            { label: 'getthreadcontext',    sig: 'getthreadcontext()',              doc: 'Alias for getthreadidentity().' },
                            { label: 'setthreadidentity',   sig: 'setthreadidentity(id)',           doc: 'Sets the current thread identity level (number 0–8).' },
                            { label: 'setidentity',         sig: 'setidentity(id)',                 doc: 'Alias for setthreadidentity(id).' },
                            { label: 'setthreadcontext',    sig: 'setthreadcontext(id)',            doc: 'Alias for setthreadidentity(id).' },
                            { label: 'islclosure',          sig: 'islclosure(func)',                doc: 'Returns true if func is a Lua closure (not C).' },
                            { label: 'isluaclosure',        sig: 'isluaclosure(func)',              doc: 'Alias for islclosure(func).' },
                            { label: 'iscclosure',          sig: 'iscclosure(func)',                doc: 'Returns true if func is a C closure.' },
                            { label: 'newlclosure',         sig: 'newlclosure(func)',               doc: 'Wraps func in a new Lua closure and marks it as executor.' },
                            { label: 'newcclosure',         sig: 'newcclosure(func)',               doc: 'Wraps func in a coroutine-based C-style closure.' },
                            { label: 'clonefunction',       sig: 'clonefunction(func)',             doc: 'Clones func as an lclosure or cclosure depending on its type.' },
                            { label: 'replaceclosure',      sig: 'replaceclosure(func)',            doc: 'Alias for hookfunction.' },
                            { label: 'cloneref',            sig: 'cloneref(instance)',              doc: 'Creates a proxy userdata for the given Instance.' },
                            { label: 'compareinstances',    sig: 'compareinstances(a, b)',          doc: 'Compares two instances or clonedref proxies for equality.' },
                            { label: 'getinstances',        sig: 'getinstances()',                  doc: 'Returns all tracked Instance proxies.' },
                            { label: 'getnilinstances',     sig: 'getnilinstances()',               doc: 'Returns all proxied Instances whose Parent is nil.' },
                            { label: 'getloadedmodules',    sig: 'getloadedmodules()',              doc: 'Returns all proxied ModuleScript instances.' },
                            { label: 'getrunningscripts',   sig: 'getrunningscripts()',             doc: 'Returns all proxied ModuleScript instances (running scripts).' },
                            { label: 'getscripts',          sig: 'getscripts()',                    doc: 'Returns all non-CoreGui LocalScript/ModuleScript/Script proxies.' },
                            { label: 'gethui',              sig: 'gethui()',                        doc: 'Returns the hidden ScreenGui container used by the executor.' },
                            { label: 'getcallingscript',    sig: 'getcallingscript()',              doc: 'Returns the script instance that called the current function.' },
                            { label: 'getcallbackvalue',    sig: 'getcallbackvalue(bindable)',      doc: 'Returns the OnInvoke callback stored for a BindableFunction proxy.' },
                            { label: 'getobjects',          sig: 'getobjects(assetId)',             doc: 'Loads a Roblox asset by id or rbxassetid:// URL and returns its children.' },
                            { label: 'getspecialinfo',      sig: 'getspecialinfo(instance)',        doc: 'Returns a table of extended info (mass, bytecode, userId, etc.) for an instance.' },
                            { label: 'typeof',              sig: 'typeof(value)',                   doc: 'Returns the type of value, resolving proxy userdata to "Instance".' },
                            { label: 'gethiddenproperty',   sig: 'gethiddenproperty(obj, prop)',    doc: 'Reads a non-scriptable property from obj.' },
                            { label: 'gethiddenprop',       sig: 'gethiddenprop(obj, prop)',        doc: 'Alias for gethiddenproperty.' },
                            { label: 'sethiddenproperty',   sig: 'sethiddenproperty(obj, prop, val)', doc: 'Sets a non-scriptable property on obj.' },
                            { label: 'sethiddenprop',       sig: 'sethiddenprop(obj, prop, val)',   doc: 'Alias for sethiddenproperty.' },
                            { label: 'isscriptable',        sig: 'isscriptable(object, property)',  doc: 'Returns true if property is scriptable on object.' },
                            { label: 'setscriptable',       sig: 'setscriptable(obj, prop, val)',   doc: 'Sets the scriptability of a property on obj. Returns new value.' },
                            { label: 'getscriptbytecode',   sig: 'getscriptbytecode(script)',       doc: 'Returns the raw bytecode string of a script instance.' },
                            { label: 'dumpstring',          sig: 'dumpstring(script)',              doc: 'Alias for getscriptbytecode(script).' },
                            { label: 'getscripthash',       sig: 'getscripthash(script)',           doc: 'Returns a SHA-384 hash of the script\'s bytecode.' },
                            { label: 'getscriptsource',     sig: 'getscriptsource(script)',         doc: 'Returns the Source of a script, or its bytecode if not available.' },
                            { label: 'getscriptfunction',   sig: 'getscriptfunction(script)',       doc: 'Alias for getscriptclosure.' },
                            { label: 'compile',             sig: 'compile(code, encoded)',          doc: 'Compiles Lua code string to bytecode via the bridge. Pass encoded=true for base64.' },
                            { label: 'setscriptbytecode',   sig: 'setscriptbytecode(script, bytecode)', doc: 'Sets the bytecode of a script instance.' },
                            { label: 'loadstring',          sig: 'loadstring(code, chunkname)',     doc: 'Compiles and loads a Lua string, returning a function or nil, err.' },
                            { label: 'decompile',           sig: 'decompile(script)',               doc: 'Decompiles a script instance and returns the source as a string.' },
                            { label: 'saveinstance',        sig: 'saveinstance(options)',           doc: 'Saves the game instance to a file. options table is optional.' },
                            { label: 'savegame',            sig: 'savegame(options)',               doc: 'Alias for saveinstance(options).' },
                            { label: 'getreg',              sig: 'getreg()',                        doc: 'Returns the Lua registry table (debug.getregistry or a collected equivalent).' },
                            { label: 'getregistry',         sig: 'getregistry()',                   doc: 'Alias for getreg().' },
                            { label: 'getgc',               sig: 'getgc(includeTables)',            doc: 'Returns garbage-collected functions and userdata. Pass true to include tables.' },
                            { label: 'filtergc',            sig: 'filtergc(typeName, options)',     doc: 'Filters getreg() by type. options: { filter, methodName }.' },
                            { label: 'getconnections',      sig: 'getconnections(signal)',          doc: 'Returns a table of connection objects for an RBXScriptSignal.' },
                            { label: 'setreadonly',         sig: 'setreadonly(t, bool)',            doc: 'Makes table t readonly (true) or writable (false).' },
                            { label: 'isreadonly',          sig: 'isreadonly(t)',                   doc: 'Returns true if table t is currently readonly.' },
                            { label: 'request',             sig: 'request(options)',                doc: 'Sends an HTTP request. options: { Url, Method, Body, Headers }. Returns response table.' },
                            { label: 'http_request',        sig: 'http_request(options)',           doc: 'Alias for request(options).' },
                            { label: 'HttpGet',             sig: 'HttpGet(url, raw)',               doc: 'Performs a GET request. Pass raw=false to JSON-decode the response.' },
                            { label: 'HttpPost',            sig: 'HttpPost(url, body, contentType)', doc: 'Performs a POST request with body and optional Content-Type.' },
                            { label: 'writefile',           sig: 'writefile(path, content)',        doc: 'Writes content (string) to a file at path. Blocks dangerous extensions.' },
                            { label: 'readfile',            sig: 'readfile(path)',                  doc: 'Reads and returns the content of a file at path.' },
                            { label: 'appendfile',          sig: 'appendfile(path, content)',       doc: 'Appends content to an existing file.' },
                            { label: 'isfile',              sig: 'isfile(path)',                    doc: 'Returns true if a file exists at path.' },
                            { label: 'isfolder',            sig: 'isfolder(path)',                  doc: 'Returns true if a folder exists at path.' },
                            { label: 'makefolder',          sig: 'makefolder(path)',                doc: 'Creates a folder at path. Returns true on success.' },
                            { label: 'delfile',             sig: 'delfile(path)',                   doc: 'Deletes a file at path.' },
                            { label: 'delfolder',           sig: 'delfolder(path)',                 doc: 'Deletes a folder at path.' },
                            { label: 'listfiles',           sig: 'listfiles(path)',                 doc: 'Returns a table of file/folder names inside path.' },
                            { label: 'copyfile',            sig: 'copyfile(src, dst)',              doc: 'Copies a file from src to dst.' },
                            { label: 'movefile',            sig: 'movefile(src, dst)',              doc: 'Moves/renames a file from src to dst.' },
                            { label: 'renamefile',          sig: 'renamefile(src, dst)',            doc: 'Alias for movefile(src, dst).' },
                            { label: 'getfilesize',         sig: 'getfilesize(path)',               doc: 'Returns the byte size of a file at path.' },
                            { label: 'loadfile',            sig: 'loadfile(path)',                  doc: 'Loads a file as Lua code. Returns func or nil, err.' },
                            { label: 'dofile',              sig: 'dofile(path)',                    doc: 'Loads and executes a Lua file at path.' },
                            { label: 'getcustomasset',      sig: 'getcustomasset(path)',            doc: 'Returns an rbxassetid:// URL for a local file asset.' },
                            { label: 'getsynasset',         sig: 'getsynasset(path)',               doc: 'Alias for getcustomasset(path).' },
                            { label: 'setclipboard',        sig: 'setclipboard(text)',              doc: 'Copies text to the system clipboard.' },
                            { label: 'setrbxclipboard',     sig: 'setrbxclipboard(text)',           doc: 'Alias for setclipboard(text).' },
                            { label: 'toclipboard',         sig: 'toclipboard(text)',               doc: 'Alias for setclipboard(text).' },
                            { label: 'getclipboard',        sig: 'getclipboard()',                  doc: 'Returns the current system clipboard text.' },
                            { label: 'consolecreate',       sig: 'consolecreate(title)',            doc: 'Opens the Fluxusz console window with an optional title.' },
                            { label: 'rconsolecreate',      sig: 'rconsolecreate(title)',           doc: 'Alias for consolecreate(title).' },
                            { label: 'consoledestroy',      sig: 'consoledestroy()',                doc: 'Closes/destroys the console window.' },
                            { label: 'rconsoledestroy',     sig: 'rconsoledestroy()',               doc: 'Alias for consoledestroy().' },
                            { label: 'consoleclear',        sig: 'consoleclear()',                  doc: 'Clears all text from the console window.' },
                            { label: 'rconsoleclear',       sig: 'rconsoleclear()',                 doc: 'Alias for consoleclear().' },
                            { label: 'consolename',         sig: 'consolename(name)',               doc: 'Sets the console window title.' },
                            { label: 'rconsolename',        sig: 'rconsolename(name)',              doc: 'Alias for consolename(name).' },
                            { label: 'consolesettitle',     sig: 'consolesettitle(name)',           doc: 'Alias for consolename(name).' },
                            { label: 'rconsolesettitle',    sig: 'rconsolesettitle(name)',          doc: 'Alias for consolename(name).' },
                            { label: 'consoleprint',        sig: 'consoleprint(...)',               doc: 'Prints plain text to the console.' },
                            { label: 'rconsoleprint',       sig: 'rconsoleprint(...)',              doc: 'Alias for consoleprint(...).' },
                            { label: 'consoleinfo',         sig: 'consoleinfo(...)',                doc: 'Prints info-styled text to the console.' },
                            { label: 'rconsoleinfo',        sig: 'rconsoleinfo(...)',               doc: 'Alias for consoleinfo(...).' },
                            { label: 'consolewarn',         sig: 'consolewarn(...)',                doc: 'Prints warning-styled text to the console.' },
                            { label: 'rconsolewarn',        sig: 'rconsolewarn(...)',               doc: 'Alias for consolewarn(...).' },
                            { label: 'rconsoleerr',         sig: 'rconsoleerr(...)',                doc: 'Prints error-styled text to the console.' },
                            { label: 'rconsoleerror',       sig: 'rconsoleerror(...)',              doc: 'Alias for rconsoleerr(...).' },
                            { label: 'consoleinput',        sig: 'consoleinput()',                  doc: 'Waits for and returns a line of input from the console.' },
                            { label: 'rconsoleinput',       sig: 'rconsoleinput()',                 doc: 'Alias for consoleinput().' },
                            { label: 'keypress',            sig: 'keypress(key)',                   doc: 'Simulates pressing a key. Accepts Enum.KeyCode, VK number, or string.' },
                            { label: 'keyrelease',          sig: 'keyrelease(key)',                 doc: 'Simulates releasing a key.' },
                            { label: 'keyclick',            sig: 'keyclick(key)',                   doc: 'Simulates a full key press+release.' },
                            { label: 'mouse1click',         sig: 'mouse1click()',                   doc: 'Simulates a left mouse button click.' },
                            { label: 'mouse2click',         sig: 'mouse2click()',                   doc: 'Simulates a right mouse button click.' },
                            { label: 'mouse1press',         sig: 'mouse1press()',                   doc: 'Simulates pressing the left mouse button.' },
                            { label: 'mouse1release',       sig: 'mouse1release()',                 doc: 'Simulates releasing the left mouse button.' },
                            { label: 'mouse2press',         sig: 'mouse2press()',                   doc: 'Simulates pressing the right mouse button.' },
                            { label: 'mouse2release',       sig: 'mouse2release()',                 doc: 'Simulates releasing the right mouse button.' },
                            { label: 'mousemoveabs',        sig: 'mousemoveabs(x, y)',              doc: 'Moves the mouse cursor to absolute screen coordinates.' },
                            { label: 'mousemoverel',        sig: 'mousemoverel(x, y)',              doc: 'Moves the mouse cursor by a relative offset.' },
                            { label: 'mousescroll',         sig: 'mousescroll(delta)',              doc: 'Simulates a mouse scroll by delta.' },
                            { label: 'isrbxactive',         sig: 'isrbxactive()',                   doc: 'Returns true if the Roblox window currently has focus.' },
                            { label: 'isgameactive',        sig: 'isgameactive()',                  doc: 'Alias for isrbxactive().' },
                            { label: 'iswindowactive',      sig: 'iswindowactive()',                doc: 'Alias for isrbxactive().' },
                            { label: 'fireclickdetector',   sig: 'fireclickdetector(part, distance, eventType)', doc: 'Fires a ClickDetector on part. eventType: "MouseClick" | "RightMouseClick" | "MouseHoverEnter" | "MouseHoverLeave".' },
                            { label: 'fireproximityprompt', sig: 'fireproximityprompt(prompt)',     doc: 'Fires a ProximityPrompt by temporarily moving it to the player.' },
                            { label: 'firetouchinterest',   sig: 'firetouchinterest(toTouch, touchWith, on)', doc: 'Simulates a touch event between two parts.' },
                            { label: 'firetouchtransmitter',sig: 'firetouchtransmitter(toTouch, touchWith, on)', doc: 'Alias for firetouchinterest.' },
                            { label: 'base64encode',        sig: 'base64encode(str)',               doc: 'Encodes a string to Base64.' },
                            { label: 'base64_encode',       sig: 'base64_encode(str)',              doc: 'Alias for base64encode.' },
                            { label: 'base64decode',        sig: 'base64decode(str)',               doc: 'Decodes a Base64 string.' },
                            { label: 'base64_decode',       sig: 'base64_decode(str)',              doc: 'Alias for base64decode.' },
                            { label: 'messagebox',          sig: 'messagebox(body, title, flag)',   doc: 'Shows a Win32 MessageBox dialog. Returns the button code pressed.' },
                            { label: 'lz4compress',         sig: 'lz4compress(str)',                doc: 'Compresses a string using LZ4.' },
                            { label: 'lz4decompress',       sig: 'lz4decompress(str, size)',        doc: 'Decompresses an LZ4-compressed string.' },
                            { label: 'getpropertychangedsignal', sig: 'getpropertychangedsignal(instance, property)', doc: 'Returns an RBXScriptSignal that fires when property changes on instance.' },
                            { label: 'setsimulationradius', sig: 'setsimulationradius(radius, maxRadius)', doc: 'Sets the player\'s SimulationRadius and MaximumSimulationRadius.' },
                            { label: 'getsimulationradius', sig: 'getsimulationradius()',           doc: 'Returns the current SimulationRadius and MaximumSimulationRadius.' },
                            { label: 'isnetworkowner',      sig: 'isnetworkowner(part)',            doc: 'Returns true if the local player owns network control of part.' },
                            { label: 'queue_on_teleport',   sig: 'queue_on_teleport(code)',         doc: 'Queues a Lua code string to run after the next teleport.' },
                            { label: 'queueonteleport',     sig: 'queueonteleport(code)',           doc: 'Alias for queue_on_teleport(code).' },
                            { label: 'FluxusZExec',         sig: 'FluxusZExec(code)',               doc: 'Compiles and executes a Lua code string in the Fluxusz executor environment.' },
                        ].map(e => ({
                            label: e.label,
                            kind: monaco.languages.CompletionItemKind.Function,
                            insertText: e.label + '($1)',
                            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                            documentation: { value: '```lua\n' + e.sig + '\n```\n' + e.doc },
                            detail: e.sig,
                        })),
                        ...['print', 'warn', 'error', 'assert', 'select', 'type', 'tostring', 'tonumber', 'unpack', 'pcall', 'xpcall', 'delay', 'wait', 'tick', 'time', 'loadstring', 'getfenv', 'setfenv'].map(f => ({
                            label: f, kind: monaco.languages.CompletionItemKind.Function, insertText: f + '($1)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
                        })),
                        ...['math', 'table', 'string', 'task', 'coroutine', 'debug', 'utf8', 'os', 'bit32'].map(l => ({
                            label: l, kind: monaco.languages.CompletionItemKind.Module, insertText: l
                        })),
                        // crypt library members
                        ...[
                            { label: 'crypt.base64encode',  sig: 'crypt.base64encode(str)',        doc: 'Encodes str to Base64.' },
                            { label: 'crypt.base64decode',  sig: 'crypt.base64decode(str)',        doc: 'Decodes a Base64 string.' },
                            { label: 'crypt.generatekey',   sig: 'crypt.generatekey(len)',         doc: 'Generates a random Base64-encoded key of len characters (default 32).' },
                            { label: 'crypt.generatebytes', sig: 'crypt.generatebytes(len)',       doc: 'Alias for crypt.generatekey(len).' },
                            { label: 'crypt.random',        sig: 'crypt.random(len)',              doc: 'Alias for crypt.generatebytes(len).' },
                            { label: 'crypt.encrypt',       sig: 'crypt.encrypt(data, key)',       doc: 'XOR-encrypts data with key. Returns encrypted string and key.' },
                            { label: 'crypt.decrypt',       sig: 'crypt.decrypt(data, key)',       doc: 'Alias for crypt.encrypt (XOR is symmetric).' },
                            { label: 'crypt.hash',          sig: 'crypt.hash(text, algorithm)',    doc: 'Hashes text with the given algorithm (e.g. "sha384", "sha256", "md5").' },
                        ].map(e => ({
                            label: e.label,
                            kind: monaco.languages.CompletionItemKind.Function,
                            insertText: e.label + '($1)',
                            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                            documentation: { value: '```lua\n' + e.sig + '\n```\n' + e.doc },
                            detail: e.sig,
                        })),
                        // cache library members
                        ...[
                            { label: 'cache.iscached',    sig: 'cache.iscached(instance)',          doc: 'Returns true if instance has not been invalidated.' },
                            { label: 'cache.invalidate',  sig: 'cache.invalidate(instance)',        doc: 'Invalidates an instance and removes it from its parent.' },
                            { label: 'cache.replace',     sig: 'cache.replace(old, new)',           doc: 'Replaces old with new in the cache and reparents it.' },
                        ].map(e => ({
                            label: e.label,
                            kind: monaco.languages.CompletionItemKind.Function,
                            insertText: e.label + '($1)',
                            insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                            documentation: { value: '```lua\n' + e.sig + '\n```\n' + e.doc },
                            detail: e.sig,
                        })),
                        { label: 'WebSocket.connect',
                          kind: monaco.languages.CompletionItemKind.Function,
                          insertText: 'WebSocket.connect($1)',
                          insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                          documentation: { value: '```lua\nWebSocket.connect(url)\n```\nOpens a WebSocket connection. Returns socket with :Send(msg), :Close(), .OnMessage, .OnClose.' },
                          detail: 'WebSocket.connect(url)' },
                        { label: 'http.request',
                          kind: monaco.languages.CompletionItemKind.Function,
                          insertText: 'http.request($1)',
                          insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet,
                          documentation: { value: '```lua\nhttp.request(options)\n```\nAlias for request(options).' },
                          detail: 'http.request(options)' },
                        { label: 'Drawing',
                          kind: monaco.languages.CompletionItemKind.Class,
                          insertText: 'Drawing',
                          documentation: { value: 'The Drawing library loaded by Fluxusz at runtime.' },
                          detail: 'Drawing' },
                        { label: 'fori', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'for ${1:i} = ${2:1}, ${3:10} do\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Simple for loop' },
                        { label: 'forp', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'for ${1:i}, ${2:v} in pairs(${3:table}) do\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Pairs loop' },
                        { label: 'forip', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'for ${1:i}, ${2:v} in ipairs(${3:table}) do\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Ipairs loop' },
                        { label: 'spawn', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'task.spawn(function()\n\t$0\nend)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Spawn a new thread' },
                        { label: 'waitfor', kind: monaco.languages.CompletionItemKind.Snippet, insertText: '${1:parent}:WaitForChild("${2:ChildName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Wait for a child instance' },
                        { label: 'getservice', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'game:GetService("${1:ServiceName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Get a Roblox service' },
                        { label: 'remote', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'game:GetService("ReplicatedStorage").${1:RemoteName}:FireServer($0)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Fire a remote event' },
                        { label: 'tween', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'game:GetService("TweenService"):Create(${1:object}, TweenInfo.new(${2:1}), {${3:Property} = ${4:Value}}):Play()', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Create and play a tween' },
                        { label: 'raycast', kind: monaco.languages.CompletionItemKind.Snippet, insertText: 'local params = RaycastParams.new()\nparams.FilterType = Enum.RaycastFilterType.Blacklist\nparams.FilterDescendantsInstances = {${1:table}}\n\nlocal result = workspace:Raycast(${2:origin}, ${3:direction}, params)\nif result then\n\t$0\nend', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet, documentation: 'Roblox Raycast setup' }
                    ];
                    return { suggestions };
                }
            });

            monaco.editor.defineTheme('FluxusZ-theme', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'string', foreground: '4facfe' },
                    { token: 'string.lua', foreground: '4facfe' },
                    { token: 'identifier', foreground: 'ffffff' },
		    { token: 'number', foreground: 'ff4d4d' },
                ],
                colors: {
                    'editor.background': '#00000000',
                    'editor.lineHighlightBackground': '#4facfe0a',
                    'editorLineNumber.foreground': '#444444',
                    'editorLineNumber.activeForeground': '#4facfe88',
                    'editorCursor.foreground': '#4facfe',
                    'minimap.background': '#00000000'
                }
            });

            const activeTab = tabs.find(t => t.id === activeTabId) || tabs[0];

            window.editor = monaco.editor.create(document.getElementById('monaco-editor'), {
                value: activeTab.content,
                language: 'lua',
                theme: 'FluxusZ-theme',
                automaticLayout: true,
                fontSize: 11,
                fontFamily: "'Fira Code', monospace",
                minimap: { enabled: false },
                scrollbar: { vertical: 'visible', horizontal: 'visible' },
                lineNumbersMinChars: 3,
                renderLineHighlight: 'all',
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: "on",
                smoothScrolling: true,
                padding: { top: 10, bottom: 10 }
            });
            window.SetText = (text) => {
                const tab = tabs.find(t => t.id === activeTabId);
                if (tab) {
                    window.editor.setValue(text);
                    tab.content = text;
                    persist();
                }
            };

            window.GetText = () => window.editor.getValue();

            window.editor.onDidChangeModelContent(() => {
                const currentTab = tabs.find(t => t.id === activeTabId);
                if (currentTab) {
                    currentTab.content = window.editor.getValue();
                    persist();
                }
            });

            updateTabsUI();
        });
    </script>
</body>
