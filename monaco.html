<!DOCTYPE html>
<html>
<head>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c0c0c; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs/loader.min.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.43.0/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            monaco.languages.registerCompletionItemProvider('lua', {
                provideCompletionItems: function(model, position) {
                    var suggestions = [
                        { label: 'game', kind: monaco.languages.CompletionItemKind.Variable, insertText: 'game' },
                        { label: 'workspace', kind: monaco.languages.CompletionItemKind.Variable, insertText: 'workspace' },
                        { label: 'script', kind: monaco.languages.CompletionItemKind.Variable, insertText: 'script' },
                        { label: 'wait', kind: monaco.languages.CompletionItemKind.Function, insertText: 'wait(${1:seconds})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'warn', kind: monaco.languages.CompletionItemKind.Function, insertText: 'warn(${1:message})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'print', kind: monaco.languages.CompletionItemKind.Function, insertText: 'print(${1:message})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'spawn', kind: monaco.languages.CompletionItemKind.Function, insertText: 'spawn(function()\n\t$0\nend)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'delay', kind: monaco.languages.CompletionItemKind.Function, insertText: 'delay(${1:seconds}, function()\n\t$0\nend)', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'tick', kind: monaco.languages.CompletionItemKind.Function, insertText: 'tick()' },
                        { label: 'Enum', kind: monaco.languages.CompletionItemKind.Class, insertText: 'Enum' },
                        { label: 'Instance', kind: monaco.languages.CompletionItemKind.Class, insertText: 'Instance' },
                        { label: 'Vector3', kind: monaco.languages.CompletionItemKind.Class, insertText: 'Vector3' },
                        { label: 'CFrame', kind: monaco.languages.CompletionItemKind.Class, insertText: 'CFrame' },
                        { label: 'Color3', kind: monaco.languages.CompletionItemKind.Class, insertText: 'Color3' },
                        { label: 'UDim2', kind: monaco.languages.CompletionItemKind.Class, insertText: 'UDim2' },
                        { label: 'task', kind: monaco.languages.CompletionItemKind.Module, insertText: 'task' },
                        { label: 'task.wait', kind: monaco.languages.CompletionItemKind.Function, insertText: 'task.wait(${1:seconds})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'task.spawn', kind: monaco.languages.CompletionItemKind.Function, insertText: 'task.spawn(${1:function})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'task.defer', kind: monaco.languages.CompletionItemKind.Function, insertText: 'task.defer(${1:function})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'task.delay', kind: monaco.languages.CompletionItemKind.Function, insertText: 'task.delay(${1:seconds}, ${2:function})', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'HttpGet', kind: monaco.languages.CompletionItemKind.Method, insertText: 'HttpGet("${1:url}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'GetObjects', kind: monaco.languages.CompletionItemKind.Method, insertText: 'GetObjects("${1:assetId}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet },
                        { label: 'GetService', kind: monaco.languages.CompletionItemKind.Method, insertText: 'GetService("${1:ServiceName}")', insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet }
                    ];
                    return { suggestions: suggestions };
                }
            });

            monaco.editor.defineTheme('wave-dark', {
                base: 'vs-dark',
                inherit: true,
                rules: [],
                colors: {
                    'editor.background': '#0c0c0c',
                }
            });
            
            window.editor = monaco.editor.create(document.getElementById('container'), {
                value: '',
                language: 'lua',
                theme: 'wave-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                backgroundColor: '#0c0c0c',
                tabCompletion: "on",
                suggestOnTriggerCharacters: true,
                quickSuggestions: true,
                acceptSuggestionOnEnter: "on"
            });
        });
        function getValue() { return window.editor.getValue(); }
        function setValue(v) { window.editor.setValue(v); }
        function setMinimap(enabled) { window.editor.updateOptions({ minimap: { enabled: enabled } }); }
    </script>
</body>
</html>
