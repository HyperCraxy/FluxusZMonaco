<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astralise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <style>
        :root {
            --bg-color: #060D14;
            --primary-accent: #4facfe;
            --text-main: #ffffff;
            --font-main: 'Outfit', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-main), 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor-shell {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
        }

        .tabs-bar {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(6, 13, 20, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0 8px 0 8px;
            height: 36px;
            flex-shrink: 0;
        }

        .tabs-container {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            height: 100%;
            align-items: center;
        }

        .tabs-container::-webkit-scrollbar { height: 0px; }
        .tabs-container { scroll-behavior: smooth; }

        .tab-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 0 10px 0 8px;
            height: 28px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid transparent;
            border-radius: 6px;
            font-size: 11.5px;
            letter-spacing: 0.01em;
            color: rgba(255,255,255,0.38);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
            min-width: 0;
            max-width: 180px;
            user-select: none;
            position: relative;
        }

        .tab-item.drag-over-left  { border-left:  2px solid #4facfe !important; }
        .tab-item.drag-over-right { border-right: 2px solid #4facfe !important; }
        .tab-item.dragging        { opacity: 0.35; cursor: grabbing; }

        .tab-item:hover {
            background: rgba(79, 172, 254, 0.07);
            color: rgba(255,255,255,0.7);
            border-color: rgba(79, 172, 254, 0.12);
        }

        .tab-item.active {
            background: rgba(79, 172, 254, 0.11);
            border-color: rgba(79, 172, 254, 0.28);
            color: #e8f4ff;
            font-weight: 500;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.08);
        }

        .tab-item.active .tab-file-icon {
            color: #4facfe;
            opacity: 1;
        }

        .tab-file-icon {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            opacity: 0.4;
            transition: opacity 0.15s, color 0.15s;
        }

        .tab-item:hover .tab-file-icon {
            opacity: 0.7;
        }

        .tab-name {
            outline: none;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            color: inherit;
            font: inherit;
            padding: 0;
            min-width: 20px;
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-name.editing {
            border-bottom-color: #4facfe;
            cursor: text;
            color: #fff;
            text-overflow: clip;
        }

        .tab-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            opacity: 0;
            flex-shrink: 0;
            transition: opacity 0.15s, background 0.15s, color 0.15s;
            margin-left: 1px;
            color: rgba(255,255,255,0.5);
        }

        .tab-item:hover .tab-close,
        .tab-item.active .tab-close {
            opacity: 0.5;
        }

        .tab-close:hover {
            opacity: 1 !important;
            background: rgba(79, 172, 254, 0.18);
            color: #4facfe;
        }

        .add-tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            width: 24px;
            height: 24px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .add-tab-btn:hover {
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
        }

        #monaco-editor { flex: 1; width: 100%; min-height: 0; }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 22px;
            padding: 0 10px;
            background: rgba(4, 10, 18, 0.95);
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-shrink: 0;
            font-size: 10.5px;
            font-family: 'Fira Code', monospace;
            color: rgba(255,255,255,0.35);
            user-select: none;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .status-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .status-lang {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.02em;
            border-radius: 3px;
            padding: 0 3px;
            transition: background 0.15s, color 0.15s;
        }

        #lang-toggle:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
        }

        .status-divider {
            width: 1px;
            height: 10px;
            background: rgba(255,255,255,0.1);
        }

        #status-pos {
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.02em;
            cursor: pointer;
            padding: 0 3px;
            border-radius: 3px;
            transition: background 0.15s, color 0.15s;
        }

        #status-pos:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
        }

        .status-diag-item {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0 6px;
            height: 16px;
            border-radius: 3px;
            font-size: 10px;
            letter-spacing: 0.01em;
            cursor: default;
            transition: background 0.15s;
        }

        .status-diag-item:hover { background: rgba(255,255,255,0.06); }

        .status-diag-item.errors {
            color: #f87171;
        }

        .status-diag-item.warnings {
            color: #fbbf24;
        }

        .status-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.3);
            font-family: 'Fira Code', monospace;
            font-size: 10.5px;
            cursor: pointer;
            padding: 0 6px;
            height: 18px;
            border-radius: 3px;
            letter-spacing: 0.02em;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .status-btn:hover {
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.6);
        }

        .status-btn.active {
            color: #4facfe;
        }

        .status-btn.active svg {
            opacity: 1;
        }

        .status-btn-divider {
            width: 1px;
            height: 10px;
            background: rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        /* ── Notifications ── */
        #notif-container {
            position: fixed;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 9999;
            pointer-events: none;
        }

        .notif {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 12px 7px 10px;
            background: rgba(10, 18, 28, 0.96);
            border: 1px solid rgba(255,255,255,0.07);
            border-left: 2px solid #4facfe;
            border-radius: 6px;
            font-size: 11px;
            font-family: 'Fira Code', monospace;
            color: rgba(255,255,255,0.75);
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            animation: notif-in 0.18s cubic-bezier(0.2,0,0,1) forwards;
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .notif.notif-out {
            animation: notif-out 0.18s ease-in forwards;
        }

        .notif-icon { opacity: 0.6; flex-shrink: 0; }

        @keyframes notif-in {
            from { opacity: 0; transform: translateX(12px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes notif-out {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(12px); }
        }

        /* ── Tab context menu ── */
        #tab-ctx-menu {
            position: fixed;
            background: rgba(8, 15, 24, 0.98);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 7px;
            padding: 4px;
            z-index: 99999;
            display: none;
            min-width: 140px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            font-family: 'Fira Code', monospace;
            font-size: 11px;
        }

        .ctx-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            color: rgba(255,255,255,0.6);
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
            user-select: none;
        }

        .ctx-item:hover {
            background: rgba(79,172,254,0.1);
            color: #e8f4ff;
        }

        .ctx-item.danger:hover {
            background: rgba(248,113,113,0.1);
            color: #f87171;
        }

        .ctx-item svg { opacity: 0.5; flex-shrink: 0; }
        .ctx-item:hover svg { opacity: 0.9; }

        .ctx-separator {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 3px 4px;
        }

        .monaco-editor,
        .monaco-editor .margin,
        .monaco-editor-background,
        .monaco-editor .inputarea.ime-input {
            background-color: transparent !important;
        }

    </style>
</head>

<body>
    <div id="notif-container"></div>
    <div id="tab-ctx-menu">
        <div class="ctx-item" id="ctx-rename">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-6 6H2.5v-2l6-6z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            Rename
        </div>
        <div class="ctx-item" id="ctx-duplicate">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="3" width="7" height="8" rx="1" stroke="currentColor" stroke-width="1.2"/><path d="M4 3V2a1 1 0 0 1 1-1h5a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-1" stroke="currentColor" stroke-width="1.2"/></svg>
            Duplicate
        </div>
        <div class="ctx-item" id="ctx-clear">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="2" y="1.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="4" x2="8" y2="4" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.4"/><line x1="4" y1="6" x2="8" y2="6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.4"/><line x1="4" y1="8" x2="6" y2="8" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.4"/><line x1="7.5" y1="7" x2="10" y2="9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="10" y1="7" x2="7.5" y2="9.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            Clear
        </div>
        <div class="ctx-separator"></div>
        <div class="ctx-item" id="ctx-open-file">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1.5 3.5A1 1 0 0 1 2.5 2.5H5l1 1.5h3.5A1 1 0 0 1 10.5 5v4.5A1 1 0 0 1 9.5 10.5h-7A1 1 0 0 1 1.5 9.5V3.5Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            Open File
        </div>
        <div class="ctx-item" id="ctx-save-file">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1.5" y="1.5" width="9" height="9" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="3.5" y="1.5" width="5" height="3" rx="0.5" stroke="currentColor" stroke-width="1.1"/><rect x="3" y="6" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.1"/></svg>
            Save File
        </div>
        <div class="ctx-separator"></div>
        <div class="ctx-item danger" id="ctx-close">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            Close Tab
        </div>
        <div class="ctx-item danger" id="ctx-close-others">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="1" y1="6" x2="4" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="8" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            Close Others
        </div>
    </div>
    <div class="editor-shell">
        <div class="tabs-bar" id="tabs-bar">
            <div class="tabs-container" id="tabs-container"></div>
            <button class="add-tab-btn" id="add-tab-btn" title="New Tab">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
        </div>
        <div id="monaco-editor"></div>
        <div class="status-bar" id="status-bar">
            <div class="status-left">
                <button class="status-btn" id="minimap-btn" title="Toggle Minimap">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.75" y="0.75" width="6.5" height="10.5" rx="1" stroke="currentColor" stroke-width="1.2"/>
                        <rect x="9" y="0.75" width="2.25" height="10.5" rx="0.75" stroke="currentColor" stroke-width="1.2"/>
                        <line x1="2.5" y1="3" x2="5.5" y2="3" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                        <line x1="2.5" y1="5" x2="5.5" y2="5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                        <line x1="2.5" y1="7" x2="4.5" y2="7" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                    Minimap
                </button>
                <span class="status-btn-divider"></span>
                <button class="status-btn" id="wrap-btn" title="Toggle Word Wrap">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="1" y1="3" x2="11" y2="3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <path d="M1 6h7a2 2 0 0 1 0 4H6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <polyline points="4,8 6,10 4,12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,-2)"/>
                    </svg>
                    Wrap
                </button>
                <span class="status-btn-divider"></span>
                <button class="status-btn" id="linenum-btn" title="Toggle Line Numbers">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="5" y1="2.5" x2="11" y2="2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="5" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="5" y1="9.5" x2="11" y2="9.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                        <text x="1" y="3.8" fill="currentColor" font-size="3.5" font-family="monospace">1</text>
                        <text x="1" y="7.3" fill="currentColor" font-size="3.5" font-family="monospace">2</text>
                        <text x="1" y="10.8" fill="currentColor" font-size="3.5" font-family="monospace">3</text>
                    </svg>
                    Nums
                </button>
                <span class="status-btn-divider"></span>
                <button class="status-btn" id="whitespace-btn" title="Toggle Render Whitespace">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="3"  cy="6" r="0.9" fill="currentColor"/>
                        <circle cx="6"  cy="6" r="0.9" fill="currentColor"/>
                        <circle cx="9"  cy="6" r="0.9" fill="currentColor"/>
                        <path d="M2 9.5 L6 9.5 L6 8 L10 10 L6 12 L6 10.5 L2 10.5 Z" fill="currentColor" opacity="0.5" transform="scale(0.7) translate(1.5, -4.5)"/>
                    </svg>
                    Spaces
                </button>
                <span class="status-btn-divider"></span>
                <button class="status-btn active" id="tabs-visibility-btn" title="Toggle Tabs Bar">
                    <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="0.75" y="4" width="10.5" height="7.25" rx="1" stroke="currentColor" stroke-width="1.2"/>
                        <rect x="0.75" y="0.75" width="3" height="3.75" rx="0.6" stroke="currentColor" stroke-width="1.2"/>
                        <rect x="4" y="0.75" width="3" height="3.75" rx="0.6" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
                    </svg>
                    Tabs
                </button>
                <span class="status-btn-divider"></span>
                <button class="status-btn" id="fontdec-btn" title="Decrease Font Size">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </button>
                <span id="font-size-label" style="font-size:10.5px;color:rgba(255,255,255,0.3);min-width:20px;text-align:center;font-family:'Fira Code',monospace;">11</span>
                <button class="status-btn" id="fontinc-btn" title="Increase Font Size">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="5" y1="2" x2="5" y2="8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div class="status-right">
                <span class="status-lang" id="lang-toggle" title="Click to toggle language" style="cursor:pointer;">
                    <svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="opacity:0.5;margin-right:4px"><path d="M7.375 0C7.80598 0 8.2193 0.171205 8.52405 0.475951C8.8288 0.780698 9 1.19402 9 1.625V5H6.625C6.19402 5 5.7807 5.17121 5.47595 5.47595C5.17121 5.7807 5 6.19402 5 6.625V9H1.625C1.19402 9 0.780698 8.8288 0.475951 8.52405C0.171205 8.2193 0 7.80598 0 7.375V1.625C0 1.19402 0.171205 0.780698 0.475951 0.475951C0.780698 0.171205 1.19402 0 1.625 0H7.375ZM8.78 5.75L5.75 8.78V6.625C5.75 6.142 6.142 5.75 6.625 5.75H8.78Z"/></svg><span id="lang-label">Lua</span>
                </span>
                <span class="status-divider"></span>
                <span id="status-diagnostics" style="display:flex;align-items:center;gap:6px;"></span>
                <span class="status-divider" id="status-diag-divider"></span>
                <span id="status-pos">Ln 1, Col 1</span>
            </div>
        </div>
    </div>

    <script>
        // Block Ctrl+S / Ctrl+Shift+S (browser save) globally
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                e.stopImmediatePropagation();
            }
        }, true);

        const STORAGE_KEY = 'Astralise_tabs';

        const persist = () => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ tabs, activeTabId }));
            } catch (e) {}
        };

        const loadFromStorage = () => {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                if (data) {
                    const parsed = JSON.parse(data);
                    if (parsed.tabs && parsed.tabs.length > 0) return parsed;
                }
            } catch (e) {}
            return null;
        };

        const stored = loadFromStorage();
        let tabs = stored ? stored.tabs : [{ id: 'tab-1', name: 'Tab', content: '--FluxusZ' }];
        let activeTabId = stored ? stored.activeTabId : 'tab-1';

        if (!tabs.find(t => t.id === activeTabId)) activeTabId = tabs[0].id;

        const renameTab = (id, inputEl) => {
            inputEl.classList.add('editing');
            inputEl.contentEditable = 'true';
            inputEl.focus();

            const range = document.createRange();
            range.selectNodeContents(inputEl);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);

            const finish = () => {
                inputEl.contentEditable = 'false';
                inputEl.classList.remove('editing');
                const newName = inputEl.textContent.trim();
                const tab = tabs.find(t => t.id === id);
                if (tab) {
                    const oldName = tab.name;
                    tab.name = newName || tab.name;
                    inputEl.textContent = tab.name;
                    if (newName && newName !== oldName) notify(`Renamed to "${tab.name}"`, 'tab');
                    persist();
                }

            const _unsupportedSet = new Set(_unsupportedDefs.map(e => e.label));

            const _hoverMap = Object.fromEntries(
                [..._allFuncDefs, ..._robloxDefs, ..._unsupportedDefs].map(e => [e.label, e])
            );

            monaco.languages.registerHoverProvider('lua', {
                provideHover: (model, position) => {
                    const word = model.getWordAtPosition(position);
                    if (!word) return null;
                    // Try bare word first, then check if preceded by a dot/colon for namespaced lookup
                    const lineText  = model.getLineContent(position.lineNumber);
                    const beforeWord = lineText.slice(0, word.startColumn - 1);
                    // Build candidate: e.g. "crypt.hash" or "debug.getinfo"
                    const nsMatch = beforeWord.match(/(\w+)[.:]$/);
                    const candidate = nsMatch ? nsMatch[1] + '.' + word.word : word.word;
                    const entry = _hoverMap[candidate] || _hoverMap[word.word];
                    if (!entry) return null;
                    const isUnsupported = _unsupportedSet.has(entry.label);
                    return {
                        range: new monaco.Range(
                            position.lineNumber, word.startColumn,
                            position.lineNumber, word.endColumn
                        ),
                        contents: [
                            { value: '```lua\n' + entry.sig + '\n```' },
                            ...(isUnsupported ? [{ value: '> ⛔ **Not Supported Function**' }] : []),
                            { value: entry.doc }
                        ]
                    };
                }
            });

            // ── Signature Help Provider ──

                _allFuncDefs.forEach(e => {

                provideSignatureHelp: (model, position) => {
                    const lineText = model.getLineContent(position.lineNumber);
                    const textBefore = lineText.slice(0, position.column - 1);

                    // Walk backwards to find the outermost unclosed '('
                    let depth = 0, openIdx = -1, activeParam = 0;
                    for (let i = textBefore.length - 1; i >= 0; i--) {
                        const ch = textBefore[i];
                        if (ch === ')') { depth++; }
                        else if (ch === '(') {
                            if (depth === 0) { openIdx = i; break; }
                            depth--;
                        } else if (ch === ',' && depth === 0) {
                            activeParam++;
                        }
                    }
                    if (openIdx === -1) return null;

                    // Extract function name before the '('
                    const beforeParen = textBefore.slice(0, openIdx);
                    const fnMatch = beforeParen.match(/([\w.]+)\s*$/);
                    if (!fnMatch) return null;
                    const fnName = fnMatch[1];

                    const entry = _sigMap[fnName];
                    if (!entry) return null;

                    return {
                        value: {
                            signatures: [{
                                label: entry.sig,
                                documentation: { value: entry.doc },
                                parameters: entry.params.map(p => ({ label: p, documentation: '' }))

                    const lines   = allText.split('\n');

                    // Patterns that count as a definition of `target`
                    const defPatterns = [
                        new RegExp(`^\\s*local\\s+function\\s+${target}\\s*\\(`),
                        new RegExp(`^\\s*function\\s+${target}\\s*[.:(]`),
                        new RegExp(`^\\s*local\\s+${target}\\s*=`),
                        new RegExp(`^\\s*${target}\\s*=\\s*function`),
                        new RegExp(`^\\s*${target}\\s*=(?!=)`),
                    ];

                        // Skip the line the cursor is on so we don't jump to ourselves

                    </span>` : '') +
                    (warnings > 0 ? `<span class="status-diag-item warnings" title="${warnings} warning${warnings !== 1 ? 's' : ''} — click to navigate" style="cursor:pointer" id="diag-warnings-btn">
                        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2L15 14H1L8 2Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><line x1="8" y1="7" x2="8" y2="10.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="8" cy="12.5" r="0.9" fill="currentColor"/></svg>
                        ${warnings}
                    </span>` : '');
                diagEl.innerHTML = html;
                diagDivider.style.display = (errors > 0 || warnings > 0) ? '' : 'none';

                // Navigate to first error on click
                const errBtn = document.getElementById('diag-errors-btn');
                if (errBtn && errors > 0) {
                    errBtn.addEventListener('click', () => {
                        const m = monaco.editor.getModelMarkers({ resource: window.editor.getModel().uri })
                            .filter(x => x.severity === monaco.MarkerSeverity.Error)
                            .sort((a, b) => a.startLineNumber - b.startLineNumber)[0];
                        if (m) window.editor.revealLineInCenter(m.startLineNumber);
                        window.editor.setPosition({ lineNumber: m.startLineNumber, column: m.startColumn });
                        window.editor.focus();
                    });
                }

                // Navigate to first warning on click
                const warnBtn = document.getElementById('diag-warnings-btn');
                if (warnBtn && warnings > 0) {
                    warnBtn.addEventListener('click', () => {
                        const m = monaco.editor.getModelMarkers({ resource: window.editor.getModel().uri })
                            .filter(x => x.severity === monaco.MarkerSeverity.Warning)
                            .sort((a, b) => a.startLineNumber - b.startLineNumber)[0];
                        if (m) window.editor.revealLineInCenter(m.startLineNumber);
                        window.editor.setPosition({ lineNumber: m.startLineNumber, column: m.startColumn });
                        window.editor.focus();
                    });
                }

                // Notify on new errors / warnings appearing or clearing
                if (errors > _prevErrors) {
                    notify(`${errors} error${errors !== 1 ? 's' : ''} detected`, 'error');
                } else if (errors === 0 && _prevErrors > 0) {
                    notify('All errors resolved', 'success');
                }
                if (warnings > _prevWarnings) {
                    notify(`${warnings} warning${warnings !== 1 ? 's' : ''}`, 'warn');
                } else if (warnings === 0 && _prevWarnings > 0) {
                    notify('All warnings resolved', 'success');
                }
                _prevErrors = errors;
                _prevWarnings = warnings;
            };

            window.editor.onDidChangeCursorPosition(updatePos);
            updatePos();

            // ── Language toggle (Lua ↔ Text) ──
            let currentLang = S.lang ?? 'lua';

            // Lua linter — runs 400ms after last keystroke
            const luaLint = () => {
                if (currentLang !== 'lua') return;
                const model = window.editor.getModel();
                if (!model) return;
                const code = model.getValue();
                const lines = code.split('\n');
                const markers = [];

                // ── Strip code of strings/comments for safe keyword parsing ──
                // Returns array of "clean" lines with string/comment content blanked
                const cleanLines = (() => {
                    const out = [];
                    let inLongString = false;
                    let longClose = '';
                    for (let i = 0; i < lines.length; i++) {
                        let raw = lines[i];
                        let cl  = '';
                        let j   = 0;

                        if (inLongString) {
                            const end = raw.indexOf(longClose);
                            if (end !== -1) { inLongString = false; j = end + longClose.length; }
                            else { out.push(''); continue; }
                        }

                        while (j < raw.length) {
                            // Long string open [[ or [=*[
                            const longOpen = raw.slice(j).match(/^\[=*\[/);
                            if (longOpen) {
                                const eq = longOpen[0].length - 2;
                                longClose = ']' + '='.repeat(eq) + ']';
                                const end = raw.indexOf(longClose, j + longOpen[0].length);
                                if (end !== -1) { j = end + longClose.length; }
                                else { inLongString = true; break; }
                                continue;
                            }
                            // Single-line comment
                            if (raw[j] === '-' && raw[j+1] === '-') { break; }
                            // Double-quoted string
                            if (raw[j] === '"') {
                                j++;
                                while (j < raw.length && raw[j] !== '"') { if (raw[j] === '\\') j++; j++; }
                                j++; continue;
                            }
                            // Single-quoted string
                            if (raw[j] === "'") {
                                j++;
                                while (j < raw.length && raw[j] !== "'") { if (raw[j] === '\\') j++; j++; }
                                j++; continue;
                            }
                            cl += raw[j]; j++;
                        }
                        out.push(cl);
                    }
                    return out;
                })();

                // ── Block balance (only on clean lines) ──
                // `for`/`while` each own their following `do` — we must not double-count.
                // We track a pendingDo counter: every for/while increments it, and the
                // next `do` seen consumes one pending slot instead of opening a new block.
                // This correctly handles inline patterns like:
                //   function foo() for _, v in pairs(t) do ... end end
                const blockStack = [];
                let pendingDo = 0;
                const keyRe = /\b(function|if|for|while|repeat|do|then|end|until|else|elseif)\b/g;

                cleanLines.forEach((cl, li) => {
                    const lineNum = li + 1;

                    let m;
                    keyRe.lastIndex = 0;
                    while ((m = keyRe.exec(cl)) !== null) {
                        const w = m[1];
                        if (w === 'function' || w === 'if' || w === 'repeat') {
                            blockStack.push({ word: w, line: lineNum });
                        } else if (w === 'for' || w === 'while') {
                            // push the block now; the coming `do` is consumed, not a new block
                            blockStack.push({ word: w, line: lineNum });
                            pendingDo++;
                        } else if (w === 'do') {
                            if (pendingDo > 0) {
                                pendingDo--; // this `do` belongs to a for/while — skip
                            } else {
                                blockStack.push({ word: 'do', line: lineNum });
                            }
                        } else if (w === 'then' || w === 'else' || w === 'elseif') {
                            // part of if-block flow, no stack change
                        } else if (w === 'end') {
                            if (blockStack.length === 0) {
                                markers.push({
                                    severity: monaco.MarkerSeverity.Error,
                                    message: "Unexpected 'end' — no matching block opener",
                                    startLineNumber: lineNum, startColumn: m.index + 1,
                                    endLineNumber: lineNum,   endColumn: m.index + 4,
                                });
                            } else {
                                blockStack.pop();
                            }
                        } else if (w === 'until') {
                            const top = blockStack[blockStack.length - 1];
                            if (!top || top.word !== 'repeat') {
                                markers.push({
                                    severity: monaco.MarkerSeverity.Error,
                                    message: "Unexpected 'until' — no matching 'repeat'",
                                    startLineNumber: lineNum, startColumn: m.index + 1,
                                    endLineNumber: lineNum,   endColumn: m.index + 6,
                                });
                            } else {
                                blockStack.pop();
                            }
                        }
                    }
                });

                // Unclosed blocks
                blockStack.forEach(b => {
                    markers.push({
                        severity: monaco.MarkerSeverity.Error,
                        message: `Unclosed '${b.word}' — missing '${b.word === 'repeat' ? 'until' : 'end'}'`,
                        startLineNumber: b.line, startColumn: 1,
                        endLineNumber: b.line,   endColumn: lines[b.line - 1].length + 1,
                    });
                });

                // ── Typo warnings (on raw lines, safe — just string matching) ──
                const typoMap = {
                    writFile: 'writefile', readFile: 'readfile', listFile: 'listfiles',
                    makeFolder: 'makefolder', isFile: 'isfile', isFolder: 'isfolder',
                    setClipboard: 'setclipboard', getClipboard: 'getclipboard',
                    loadString: 'loadstring', getScriptBytecode: 'getscriptbytecode',
                    fireClickDetector: 'fireclickdetector', getInstances: 'getinstances',
                    getScripts: 'getscripts', getHUI: 'gethui', getGenv: 'getgenv',
                    getRenv: 'getrenv', checkCaller: 'checkcaller',
                };
                lines.forEach((raw, li) => {
                    Object.entries(typoMap).forEach(([typo, correct]) => {
                        const idx = raw.indexOf(typo + '(');
                        if (idx !== -1) {
                            markers.push({
                                severity: monaco.MarkerSeverity.Warning,
                                message: `'${typo}' — did you mean '${correct}'?`,
                                startLineNumber: li + 1, startColumn: idx + 1,
                                endLineNumber: li + 1,   endColumn: idx + typo.length + 1,
                            });
                        }
                    });

                    // ── Assignment in condition (only on clean line to avoid string FPs) ──
                    const cl = cleanLines[li] || '';
                    if (/^\s*(if|while|elseif)\b/.test(cl)) {
                        // Extract only up to the first 'then'/'do' so body assignments don't bleed in
                        const condMatch = cl.match(/^\s*(?:if|while|elseif)\s+([\s\S]*?)\s+(?:then|do)\b/);
                        if (condMatch) {
                            const cond = condMatch[1];
                            if (/(?<![=!<>~])=(?!=)/.test(cond)) {
                                markers.push({
                                    severity: monaco.MarkerSeverity.Warning,
                                    message: "Possible assignment '=' inside condition — did you mean '=='?",
                                    startLineNumber: li + 1, startColumn: 1,
                                    endLineNumber: li + 1,   endColumn: raw.length + 1,
                                });
                            }
                        }
                    }
                });

                monaco.editor.setModelMarkers(model, 'lua-lint', markers);
                updateDiagnostics();
            };

            window.editor.onDidChangeModelContent(() => {
                clearTimeout(window._lintTimer);
                window._lintTimer = setTimeout(luaLint, 400);
            });
            monaco.editor.onDidChangeMarkers(() => updateDiagnostics());
            luaLint();

            // ── Language toggle (Lua ↔ Text) ──
            // Apply restored language on load
            monaco.editor.setModelLanguage(window.editor.getModel(), currentLang);
            document.getElementById('lang-label').textContent = currentLang === 'lua' ? 'Lua' : 'Text';

            document.getElementById('lang-toggle').addEventListener('click', () => {
                currentLang = currentLang === 'lua' ? 'plaintext' : 'lua';
                monaco.editor.setModelLanguage(window.editor.getModel(), currentLang);
                document.getElementById('lang-label').textContent = currentLang === 'lua' ? 'Lua' : 'Text';
                saveSettings({ lang: currentLang });
                notify(`Language: ${currentLang === 'lua' ? 'Lua' : 'Plain Text'}`, 'info');
                if (currentLang !== 'lua') {
                    monaco.editor.setModelMarkers(window.editor.getModel(), 'lua-lint', []);
                    updateDiagnostics();
                } else {
                    luaLint();
                }
            });

            updateTabsUI();
        });
    </script>
</body>
</html>
